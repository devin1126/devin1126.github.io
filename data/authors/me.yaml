experience:
  - role: Research Intern (NASA OSTEM Program)
    org: NASA Goddard Space Flight Center, GSFC Flight Dynamics Team
    start: 2026-06-01
    end: 2026-08-07
    summary: |
      As ongoing work, I am developing reinforcement learning-based autonomous reconnaissance planning algorithms for the OSIRIS-APEX mission to asteroid Apophis, focusing on uncertainty-aware decision making and autonomous spacecraft operations.

  - role: Research Intern (ATRC/SDIP Program)
    org: Air Force Research Laboratory Sensors Directorate
    start: 2023-05-01
    end: 2026-06-01
    summary: |
      Developed deep learning-based state estimation algorithms for vehicle tracking and autonomous systems. Current neural process-based estimation framework achieves approximately 32% lower estimation error than state-of-the-art baseline approaches across multiple tracking scenarios. Research has resulted in an accepted paper at SPIE Defense + Security, poster at NAML, and other machine learning-focused AFRL conferences.

  - role: Graduate Research Assistant
    org: University of Central Florida, Nonlinear Controls Lab
    start: 2021-08-05
    end: 2022-08-07
    summary: |
      Constructed a 6-DOF NASA HL-20 spacecraft orbital re-entry simulation and implemented a State-Dependent Riccati Equation (SDRE) guidance law. Achieved approximately 19% improved trajectory tracking performance and 50% reduction in thrust energy consumption relative to baseline iLQR guidance.

  - role: Undergraduate Research Intern
    org: Massachusetts Institute of Technology, Robust Robotics Group
    start: 2020-06-01
    end: 2020-07-31
    summary: |
      Designed and implemented an autonomous navigation system for a wheeled mobile robot using a single HC-SR04 ultrasonic sensor and Arduino-based feedback control. Demonstrated navigation performance within 7% of human teleoperation metrics while utilizing significantly reduced sensing requirements.

  - role: Undergraduate Research Intern
    org: Stanford University, CHARM Lab
    start: 2019-06-01
    end: 2019-08-31
    summary: |
      Developed a Unity-based simulation environment for manipulator-equipped soft robotic systems performing shared-autonomy object manipulation. Validated control algorithms using real-time physics simulation to support future deployment on physical robotic platforms.

